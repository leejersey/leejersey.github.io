<!DOCTYPE html><html lang="zh-Hans"><head><meta name="generator" content="Hexo 3.8.0"><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> js中多维数组转一维 · jersey's blog</title><meta name="description" content="js中多维数组转一维 - Jersey"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="http://yoursite.com/atom.xml" title="jersey's blog"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/favicon.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="https://weibo.com/u/2012726081" target="_blank" class="nav-list-link">WEIBO</a></li><li class="nav-list-item"><a href="https://github.com/leejersey" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">js中多维数组转一维</h1><div class="post-info">Dec 22, 2018</div><div class="post-content"><p>法一：使用数组map()方法，对数组中的每一项运行给定函数，返回每次函数调用的结果组成的数组。</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> arr = [<span class="number">1</span>,[<span class="number">2</span>,[[<span class="number">3</span>,<span class="number">4</span>],<span class="number">5</span>],<span class="number">6</span>]];</span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">unid</span>(<span class="params">arr</span>)</span>&#123;</span><br><span class="line">        <span class="keyword">var</span> arr1 = (arr + <span class="string">''</span>).split(<span class="string">','</span>);<span class="comment">//将数组转字符串后再以逗号分隔转为数组</span></span><br><span class="line">        <span class="keyword">var</span> arr2 = arr1.map(<span class="function"><span class="keyword">function</span>(<span class="params">x</span>)</span>&#123;</span><br><span class="line">            <span class="keyword">return</span> <span class="built_in">Number</span>(x);</span><br><span class="line">        &#125;);</span><br><span class="line">        <span class="keyword">return</span> arr2;</span><br><span class="line">&#125;</span><br><span class="line"><span class="built_in">console</span>.log(unid(arra));</span><br></pre></td></tr></table></figure>
<p>法二：将数组转为字符串再转为数组，缺点是数组中每项成字符串了</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> arr = [<span class="number">1</span>,[<span class="number">2</span>,[[<span class="number">3</span>,<span class="number">4</span>],<span class="number">5</span>],<span class="number">6</span>]];</span><br><span class="line"><span class="keyword">var</span> arr2 = arr.join(<span class="string">','</span>).split(<span class="string">','</span>);</span><br><span class="line"><span class="built_in">console</span>.log(arr2);<span class="comment">//["1", "2", "3", "4", "5", "6"]</span></span><br><span class="line"><span class="comment">//或</span></span><br><span class="line"><span class="keyword">var</span> c=[<span class="number">1</span>,<span class="number">3</span>,<span class="number">4</span>,<span class="number">5</span>,[<span class="number">6</span>,[<span class="number">0</span>,<span class="number">1</span>,<span class="number">5</span>],<span class="number">9</span>],[<span class="number">2</span>,<span class="number">5</span>,[<span class="number">1</span>,<span class="number">5</span>]],[<span class="number">5</span>]];</span><br><span class="line"><span class="built_in">console</span>.log(c.toString().split(<span class="string">','</span>))</span><br></pre></td></tr></table></figure>
<p>法三：递归</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> arr = [<span class="number">1</span>,[<span class="number">2</span>,[[<span class="number">3</span>,<span class="number">4</span>],<span class="number">5</span>],<span class="number">6</span>]];</span><br><span class="line"><span class="keyword">var</span> newArr = [];</span><br><span class="line">    </span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">fun</span>(<span class="params">arr</span>)</span>&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">var</span> i=<span class="number">0</span>;i&lt;arr.length;i++)&#123;</span><br><span class="line">            <span class="keyword">if</span>(<span class="built_in">Array</span>.isArray(arr[i]))&#123;</span><br><span class="line">                fun(arr[i]);</span><br><span class="line">            &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">                newArr.push(arr[i]);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">fun(arr);</span><br><span class="line"><span class="built_in">console</span>.log(newArr);<span class="comment">//[1, 2, 3, 4, 5, 6]</span></span><br></pre></td></tr></table></figure>
<p>法四：reduce+递归</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> arr = [<span class="number">1</span>,[<span class="number">2</span>,[[<span class="number">3</span>,<span class="number">4</span>],<span class="number">5</span>],<span class="number">6</span>]];</span><br><span class="line"><span class="keyword">const</span> flatten = <span class="function"><span class="params">arr</span> =&gt;</span> arr.reduce(</span><br><span class="line">    (acc,val) =&gt; acc.concat(<span class="built_in">Array</span>.isArray(val)? flatten(val):val),[]</span><br><span class="line">)</span><br><span class="line"><span class="built_in">console</span>.log(flatten(arr));<span class="comment">//[1, 2, 3, 4, 5, 6]</span></span><br></pre></td></tr></table></figure>
