<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> 中央定时器控制 · jersey's blog</title><meta name="description" content="中央定时器控制 - Jersey"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="http://yoursite.com/atom.xml" title="jersey's blog"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/favicon.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="https://weibo.com/u/2012726081" target="_blank" class="nav-list-link">WEIBO</a></li><li class="nav-list-item"><a href="https://github.com/leejersey" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">中央定时器控制</h1><div class="post-info">Oct 13, 2018</div><div class="post-content"><p>在多个定时器中使用中央定时器控制，可以带来很大的威力和灵活性</p>
<ol>
<li>每个页面在同一时间只需要运行一个定时器。</li>
<li>可以更具需要暂停和恢复定时器</li>
<li>删除回调函数的过程变得很简单</li>
</ol>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">var</span> timers = &#123;</div><div class="line">    timerID: <span class="number">0</span>,</div><div class="line">    timers: [],</div><div class="line">    </div><div class="line">    add: <span class="function"><span class="keyword">function</span>(<span class="params">fn</span>)</span>&#123;</div><div class="line">        <span class="keyword">this</span>.timers.push(fn);</div><div class="line">    &#125;,</div><div class="line">    </div><div class="line">    start: <span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</div><div class="line">        <span class="keyword">if</span>(<span class="keyword">this</span>.timerID) <span class="keyword">return</span>;</div><div class="line">        (<span class="function"><span class="keyword">function</span> <span class="title">runNext</span>(<span class="params"></span>)</span>&#123;</div><div class="line">            <span class="keyword">if</span> (timers.timers.lenght &gt; <span class="number">0</span>)&#123;</div><div class="line">                <span class="keyword">for</span>(<span class="keyword">var</span> i =<span class="number">0</span>; i&lt;timers.timers.lenghth;i++)&#123;</div><div class="line">                    <span class="keyword">if</span>(timers.timers[i] === <span class="literal">false</span>)&#123;</div><div class="line">                        timers.timers.splice(i,<span class="number">1</span>);</div><div class="line">                        i--;</div><div class="line">                    &#125;</div><div class="line">                &#125;</div><div class="line">                timers.timerID = setTimeout(runNext,<span class="number">0</span>);</div><div class="line">            &#125;</div><div class="line">        &#125;)();</div><div class="line">    &#125;,</div><div class="line">    </div><div class="line">    stop: <span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</div><div class="line">        clearTimeOut(<span class="keyword">this</span>.timerID);</div><div class="line">        <span class="keyword">this</span>.timerID = <span class="number">0</span>;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
<p>使用：</p>
<figure class="highlight html"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line"><span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">"box"</span>&gt;</span>hello<span class="tag">&lt;/<span class="name">div</span>&gt;</span></div></pre></td></tr></table></figure>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">var</span> box = <span class="built_in">document</span>.getElementById(<span class="string">'box'</span>),</div><div class="line">	x = <span class="number">0</span>,</div><div class="line">	y = <span class="number">20</span>;</div><div class="line"></div><div class="line">timers.add(<span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</div><div class="line">    box.style.left = x + <span class="string">'px'</span>;</div><div class="line">    <span class="keyword">if</span>(++x &gt; <span class="number">50</span>) <span class="keyword">return</span> <span class="literal">false</span>;</div><div class="line">&#125;);</div><div class="line"></div><div class="line">timers.add(<span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</div><div class="line">    box.style.top = y + <span class="string">'px'</span>;</div><div class="line">    y +=<span class="number">2</span>;</div><div class="line">    <span class="keyword">if</span>(y &gt; <span class="number">120</span>) <span class="keyword">return</span> <span class="literal">false</span>;</div><div class="line">&#125;);</div><div class="line"></div><div class="line">timers.start();</div></pre></td></tr></table></figure>
